<?xml version="1.0" encoding="UTF-8"?>

<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1600 520"
width="1600"
height="520">

<!-- ===================================================== -->
<!-- DEFINITIONS -->
<!-- ===================================================== -->

<defs>

<!-- Background -->

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">

<stop offset="0%" stop-color="#06131F"/>

<stop offset="100%" stop-color="#0A1E31"/>

</linearGradient>

<!-- Blueprint Grid -->

<pattern
id="smallGrid"
width="20"
height="20"
patternUnits="userSpaceOnUse">

<path
d="M20 0H0V20"
fill="none"
stroke="#153652"
stroke-width=".5"/>

</pattern>

<pattern
id="grid"
width="100"
height="100"
patternUnits="userSpaceOnUse">

<rect
width="100"
height="100"
fill="url(#smallGrid)"/>

<path
d="M100 0H0V100"
fill="none"
stroke="#1C5076"
stroke-width="1"/>

</pattern>

<!-- Glow -->

<filter id="glow">

<feGaussianBlur
stdDeviation="4"
result="blur"/>

<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>

<!-- Strong Glow -->

<filter id="bigGlow">

<feGaussianBlur
stdDeviation="8"
result="blur"/>

<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>

</defs>

<!-- ===================================================== -->
<!-- BACKGROUND -->
<!-- ===================================================== -->

<rect
width="1600"
height="520"
fill="url(#bg)"/>

<!-- ===================================================== -->
<!-- GRID -->
<!-- ===================================================== -->

<rect
width="1600"
height="520"
fill="url(#grid)"
opacity=".55"/>
<!-- ===================================================== -->
<!-- HUD FRAME -->
<!-- ===================================================== -->

<g id="hudFrame"
stroke="#00E5FF"
stroke-width="2"
fill="none"
filter="url(#glow)"
opacity=".75">

    <!-- Top -->

    <path d="
    M80 40
    L250 40
    L275 20
    L1325 20
    L1350 40
    L1520 40"/>

    <!-- Bottom -->

    <path d="
    M80 480
    L250 480
    L275 500
    L1325 500
    L1350 480
    L1520 480"/>

    <!-- Left -->

    <path d="
    M40 80
    L40 200
    L20 225
    L20 295
    L40 320
    L40 440"/>

    <!-- Right -->

    <path d="
    M1560 80
    L1560 200
    L1580 225
    L1580 295
    L1560 320
    L1560 440"/>

</g>

<!-- ===================================================== -->
<!-- GLOWING CORNERS -->
<!-- ===================================================== -->

<g
stroke="#66FCFF"
stroke-width="3"
fill="none"
filter="url(#glow)">

<!-- Top Left -->

<path d="M40 100 L40 40 L100 40">
<animate
attributeName="opacity"
values="1;.35;1"
dur="4s"
repeatCount="indefinite"/>
</path>

<!-- Top Right -->

<path d="M1560 100 L1560 40 L1500 40">
<animate
attributeName="opacity"
values="1;.35;1"
dur="4s"
repeatCount="indefinite"/>
</path>

<!-- Bottom Left -->

<path d="M40 420 L40 480 L100 480">
<animate
attributeName="opacity"
values="1;.35;1"
dur="4s"
repeatCount="indefinite"/>
</path>

<!-- Bottom Right -->

<path d="M1560 420 L1560 480 L1500 480">
<animate
attributeName="opacity"
values="1;.35;1"
dur="4s"
repeatCount="indefinite"/>
</path>

</g>

<!-- ===================================================== -->
<!-- TOP HUD BAR -->
<!-- ===================================================== -->

<g
stroke="#00E5FF"
stroke-width="2"
opacity=".55">

<line x1="520" y1="30" x2="1080" y2="30"/>

<line x1="640" y1="18" x2="960" y2="18"
opacity=".35"/>

<circle
cx="800"
cy="30"
r="4"
fill="#00E5FF">

<animate
attributeName="r"
values="4;6;4"
dur="3s"
repeatCount="indefinite"/>

</circle>

</g>

<!-- ===================================================== -->
<!-- SIDE TICKS -->
<!-- ===================================================== -->

<g
stroke="#00E5FF"
stroke-width="1.5"
opacity=".30">

<line x1="80" y1="120" x2="60" y2="120"/>
<line x1="80" y1="170" x2="55" y2="170"/>
<line x1="80" y1="220" x2="60" y2="220"/>
<line x1="80" y1="270" x2="55" y2="270"/>
<line x1="80" y1="320" x2="60" y2="320"/>
<line x1="80" y1="370" x2="55" y2="370"/>

<line x1="1520" y1="120" x2="1545" y2="120"/>
<line x1="1520" y1="170" x2="1540" y2="170"/>
<line x1="1520" y1="220" x2="1545" y2="220"/>
<line x1="1520" y1="270" x2="1540" y2="270"/>
<line x1="1520" y1="320" x2="1545" y2="320"/>
<line x1="1520" y1="370" x2="1540" y2="370"/>

</g>

<!-- ===================================================== -->
<!-- GRID MOTION -->
<!-- ===================================================== -->

<g opacity=".06">

<rect
x="-100"
y="0"
width="1800"
height="520"
fill="url(#grid)">

<animateTransform
attributeName="transform"
type="translate"
values="0 0;30 15;0 0"
dur="40s"
repeatCount="indefinite"/>

</rect>

</g>

<!-- ===================================================== -->
<!-- SMALL HUD DOTS -->
<!-- ===================================================== -->

<g fill="#66FCFF">

<circle cx="120" cy="60" r="2">
<animate attributeName="opacity"
values=".2;1;.2"
dur="2s"
repeatCount="indefinite"/>
</circle>

<circle cx="1480" cy="60" r="2">
<animate attributeName="opacity"
values="1;.2;1"
dur="2s"
repeatCount="indefinite"/>
</circle>

<circle cx="120" cy="460" r="2">
<animate attributeName="opacity"
values=".2;1;.2"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="1480" cy="460" r="2">
<animate attributeName="opacity"
values="1;.2;1"
dur="3s"
repeatCount="indefinite"/>
</circle>

</g>
<!-- ===================================================== -->
<!-- LEFT INFORMATION PANEL -->
<!-- ===================================================== -->

<g id="leftPanel">

    <!-- Small Heading -->

    <text
        x="110"
        y="95"
        fill="#66FCFF"
        font-family="Segoe UI, Arial"
        font-size="15"
        letter-spacing="4"
        opacity=".8">

        ENGINEERING DASHBOARD

    </text>

    <!-- Main Title -->

    <text
        x="110"
        y="165"
        fill="#E8FFFF"
        font-family="Arial, Helvetica, sans-serif"
        font-size="58"
        font-weight="700"
        filter="url(#bigGlow)">

        ENGINEERING

        <animate
            attributeName="opacity"
            values="1;.75;1"
            dur="4s"
            repeatCount="indefinite"/>

    </text>

    <text
        x="110"
        y="220"
        fill="#E8FFFF"
        font-family="Arial, Helvetica, sans-serif"
        font-size="58"
        font-weight="700"
        filter="url(#bigGlow)">

        PORTFOLIO

        <animate
            attributeName="opacity"
            values=".75;1;.75"
            dur="4s"
            repeatCount="indefinite"/>

    </text>

    <!-- Cyan Divider -->

    <line

        x1="110"
        y1="245"

        x2="620"
        y2="245"

        stroke="#00E5FF"
        stroke-width="3">

        <animate
            attributeName="x2"
            values="250;620;250"
            dur="6s"
            repeatCount="indefinite"/>

    </line>

</g>



<!-- ===================================================== -->
<!-- PROFILE -->
<!-- ===================================================== -->

<g id="profile">

<text
x="110"
y="295"
fill="#FFFFFF"
font-family="Segoe UI, Arial"
font-size="28">

Md Laisur Rahman Khan Turjo

</text>

<text
x="110"
y="330"
fill="#67F2FF"
font-family="Segoe UI, Arial"
font-size="20">

Mechanical Engineer

</text>

<text
x="110"
y="360"
fill="#A9F8FF"
font-family="Segoe UI, Arial"
font-size="16">

UAV Systems • Robotics • CAD • CFD • Simulation

</text>

</g>



<!-- ===================================================== -->
<!-- STATUS PANEL -->
<!-- ===================================================== -->

<g id="statusPanel">

<text
x="110"
y="420"
fill="#00FFAA"
font-family="Consolas"
font-size="16">

● SYSTEM ONLINE

<animate
attributeName="opacity"
values="1;.35;1"
dur="2s"
repeatCount="indefinite"/>

</text>

<text
x="110"
y="445"
fill="#78F6FF"
font-family="Consolas"
font-size="14">

CAD MODULE ........ READY

</text>

<text
x="110"
y="465"
fill="#78F6FF"
font-family="Consolas"
font-size="14">

CFD MODULE ........ READY

</text>

<text
x="110"
y="485"
fill="#78F6FF"
font-family="Consolas"
font-size="14">

IEEE DATABASE ..... CONNECTED

</text>

</g>



<!-- ===================================================== -->
<!-- HUD DECORATION -->
<!-- ===================================================== -->

<g
stroke="#00E5FF"
stroke-width="2"
opacity=".35">

<line
x1="110"
y1="385"
x2="720"
y2="385"/>

<line
x1="110"
y1="392"
x2="650"
y2="392"
opacity=".4"/>

<line
x1="110"
y1="399"
x2="520"
y2="399"
opacity=".25"/>

</g>
<!-- ===================================================== -->
<!-- VTOL UAV BLUEPRINT -->
<!-- ===================================================== -->

<g id="vtolBlueprint"
   transform="translate(930,260)"
   stroke="#66F8FF"
   stroke-width="2"
   fill="none"
   filter="url(#glow)"
   opacity=".85">

    <!-- ========================= -->
    <!-- FUSELAGE -->
    <!-- ========================= -->

    <rect
        x="-170"
        y="-12"
        width="340"
        height="24"
        rx="10"/>

    <!-- Nose -->

    <polygon
        points="170,-12 205,0 170,12"/>

    <!-- Tail -->

    <polygon
        points="-170,-12 -205,0 -170,12"/>

    <!-- ========================= -->
    <!-- MAIN WING -->
    <!-- ========================= -->

    <polygon
        points="
        -20,-12
        -120,-90
        110,-25
        210,-12
        110,25
        -120,90
        -20,12"/>

    <!-- ========================= -->
    <!-- HORIZONTAL TAIL -->
    <!-- ========================= -->

    <polygon
        points="
        -175,-8
        -245,-42
        -175,8
        -245,42"/>

    <!-- ========================= -->
    <!-- VERTICAL TAIL -->
    <!-- ========================= -->

    <polygon
        points="
        -175,0
        -160,-60
        -145,0"/>

    <!-- ========================= -->
    <!-- CENTER LINE -->
    <!-- ========================= -->

    <line
        x1="-260"
        y1="0"
        x2="260"
        y2="0"
        opacity=".25"/>

    <!-- ========================= -->
    <!-- ROTOR GUIDES -->
    <!-- ========================= -->

    <circle cx="-120" cy="-90" r="28"/>
    <circle cx="-120" cy="90" r="28"/>

    <circle cx="110" cy="-25" r="24"/>
    <circle cx="110" cy="25" r="24"/>

    <!-- Rotor Hubs -->

    <circle cx="-120" cy="-90" r="4" fill="#66F8FF"/>
    <circle cx="-120" cy="90" r="4" fill="#66F8FF"/>

    <circle cx="110" cy="-25" r="4" fill="#66F8FF"/>
    <circle cx="110" cy="25" r="4" fill="#66F8FF"/>

</g>

<!-- ===================================================== -->
<!-- ENGINEERING DIMENSIONS -->
<!-- ===================================================== -->

<g
transform="translate(930,260)"
stroke="#66F8FF"
stroke-width="1"
opacity=".45"
fill="none">

    <!-- Wingspan -->

    <line x1="-120" y1="-135" x2="210" y2="-135"/>

    <line x1="-120" y1="-125" x2="-120" y2="-145"/>

    <line x1="210" y1="-125" x2="210" y2="-145"/>

    <!-- Fuselage -->

    <line x1="245" y1="-12" x2="245" y2="12"/>

    <line x1="225" y1="0" x2="295" y2="0"/>

    <!-- Center of Gravity -->

    <circle
        cx="-20"
        cy="0"
        r="18"/>

    <line
        x1="-30"
        y1="0"
        x2="-10"
        y2="0"/>

    <line
        x1="-20"
        y1="-10"
        x2="-20"
        y2="10"/>

</g>

<!-- ===================================================== -->
<!-- LABELS -->
<!-- ===================================================== -->

<g
transform="translate(930,260)"
fill="#8CFBFF"
font-family="Consolas"
font-size="12">

<text x="-5" y="-150">WING SPAN</text>

<text x="305" y="5">LENGTH</text>

<text x="-55" y="-28">CG</text>

<text x="-255" y="-84">ROTOR</text>

<text x="145" y="-18">TILT</text>

</g>
<!-- ===================================================== -->
<!-- RADAR SYSTEM -->
<!-- ===================================================== -->

<g id="radarSystem"
   transform="translate(1325,250)">

    <!-- Outer Ring -->

    <circle
        r="120"
        fill="none"
        stroke="#00E5FF"
        stroke-width="2"
        opacity=".35"/>

    <circle
        r="90"
        fill="none"
        stroke="#00E5FF"
        opacity=".25"/>

    <circle
        r="60"
        fill="none"
        stroke="#00E5FF"
        opacity=".20"/>

    <circle
        r="30"
        fill="none"
        stroke="#00E5FF"
        opacity=".20"/>

    <!-- Crosshair -->

    <line
        x1="-120"
        y1="0"
        x2="120"
        y2="0"
        stroke="#00E5FF"
        opacity=".25"/>

    <line
        x1="0"
        y1="-120"
        x2="0"
        y2="120"
        stroke="#00E5FF"
        opacity=".25"/>

    <!-- ================================================= -->
    <!-- Radar Sweep -->
    <!-- ================================================= -->

    <g>

        <animateTransform
            attributeName="transform"
            type="rotate"
            from="0"
            to="360"
            dur="6s"
            repeatCount="indefinite"/>

        <line
            x1="0"
            y1="0"
            x2="105"
            y2="0"
            stroke="#66FCFF"
            stroke-width="3"/>

        <circle
            cx="105"
            cy="0"
            r="3"
            fill="#66FCFF"/>

    </g>

    <!-- ================================================= -->
    <!-- Expanding Pulse -->
    <!-- ================================================= -->

    <circle
        r="10"
        fill="none"
        stroke="#66FCFF"
        opacity=".35">

        <animate
            attributeName="r"
            values="10;120"
            dur="4s"
            repeatCount="indefinite"/>

        <animate
            attributeName="opacity"
            values=".35;0"
            dur="4s"
            repeatCount="indefinite"/>

    </circle>

    <!-- ================================================= -->
    <!-- Targets -->
    <!-- ================================================= -->

    <g fill="#66FCFF">

        <circle cx="45" cy="-55" r="3">
            <animate attributeName="opacity"
                     values="0;1;0"
                     dur="2s"
                     repeatCount="indefinite"/>
        </circle>

        <circle cx="-70" cy="50" r="3">
            <animate attributeName="opacity"
                     values="0;1;0"
                     dur="3s"
                     repeatCount="indefinite"/>
        </circle>

        <circle cx="15" cy="78" r="3">
            <animate attributeName="opacity"
                     values="0;1;0"
                     dur="2.5s"
                     repeatCount="indefinite"/>
        </circle>

        <circle cx="-35" cy="-82" r="3">
            <animate attributeName="opacity"
                     values="0;1;0"
                     dur="3.5s"
                     repeatCount="indefinite"/>
        </circle>

    </g>

</g>

