<!-- ===================================================== -->
<!-- MECHANICAL GEAR -->
<!-- ===================================================== -->

<g id="gearAssembly"
   transform="translate(180,425)"
   stroke="#66FCFF"
   stroke-width="2"
   fill="none"
   opacity=".75">

    <g>

        <animateTransform
            attributeName="transform"
            type="rotate"
            from="0"
